<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Forma — train what AI can't replace</title>
  <meta name="description" content="Forma helps you measure and strengthen the human capacities that matter most in an age of AI." />

  <!-- Social link previews (Open Graph + Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Forma" />
  <meta property="og:title" content="Forma — train what AI can't replace" />
  <meta property="og:description" content="Measure and strengthen the human capacities that grow more valuable as AI does more of the cognitive work — attention, judgment, deep reading, presence, emotional intelligence, and more." />
  <meta property="og:url" content="https://drseantobin.github.io/forma/" />
  <meta property="og:image" content="https://drseantobin.github.io/forma/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Forma — train what AI can't replace" />
  <meta name="twitter:description" content="Measure and strengthen the human capacities that grow more valuable as AI does more of the cognitive work." />
  <meta name="twitter:image" content="https://drseantobin.github.io/forma/og-image.png" />

  <link rel="stylesheet" href="styles.css" />
  <!-- PWA: installable, app-like on phones -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#4c5fd5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14151a" media="(prefers-color-scheme: dark)" />
  <!-- Apply a saved Appearance preference (light/dark) BEFORE first paint, so an
       explicit choice never flashes the wrong theme. Absent → follow the OS (CSS @media). -->
  <script>try{var t=localStorage.getItem('forma_theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Forma" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to content</a>
  <main id="app" role="main" tabindex="-1">
    <!-- Rendered by app.js -->
    <div class="boot">
      <div class="boot-logo" aria-hidden="true"><svg class="fmark" viewBox="0 0 32 32" fill="none"><path d="M13 6 C6 9 6 20 11 26 C12 19 12 12 13 6 Z" fill="var(--green)"/><path d="M13 4 H26 V8.5 H17.5 V13.2 H23 V17.4 H17.5 V28 H13 Z" fill="var(--ink)"/></svg></div>
      <div class="boot-name">Forma</div>
      <div class="boot-tag">train what AI can’t replace</div>
    </div>
  </main>

  <!-- Global assistive-tech announcer. Lives OUTSIDE #app (which app.js re-renders
       wholesale on every view swap) so announce() survives those re-renders — used
       to speak exercise correctness, results, and other transient outcomes. -->
  <div id="live" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Bottom navigation (hidden until onboarded) -->
  <nav id="tabbar" class="tabbar" aria-label="Primary" hidden>
    <!-- Inline-SVG stroke icons (24px grid, currentColor) — consistent line weight,
         crisp on every device, and they inherit the tab's active/inactive + dark-mode
         color automatically. Replaces cross-platform-inconsistent emoji. -->
    <button data-route="home" class="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11 12 4l8 7"/><path d="M6 10v9h12v-9"/></svg></span><span>Home</span></button>
    <button data-route="session" class="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="3"/></svg></span><span>Today</span></button>
    <button data-route="progress" class="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4 15 9 10 13 14 20 6"/><polyline points="20 11 20 6 15 6"/></svg></span><span>Progress</span></button>
    <button data-route="coach" class="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 6h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H9l-4 3.5V7a1 1 0 0 1 1-1Z"/></svg></span><span>Coach</span></button>
    <button data-route="tools" class="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="7" height="7" rx="1.6"/><rect x="13" y="4" width="7" height="7" rx="1.6"/><rect x="4" y="13" width="7" height="7" rx="1.6"/><rect x="13" y="13" width="7" height="7" rx="1.6"/></svg></span><span>Tools</span></button>
    <button data-route="settings" class="tab"><span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 8h9"/><path d="M17 8h3"/><circle cx="15" cy="8" r="2"/><path d="M4 16h3"/><path d="M11 16h9"/><circle cx="9" cy="16" r="2"/></svg></span><span>Settings</span></button>
  </nav>

  <script type="module" src="app.js"></script>
  <script>
    // Register the service worker so Forma installs to the home screen and
    // works offline. Harmless on localhost; required for the installable PWA.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
